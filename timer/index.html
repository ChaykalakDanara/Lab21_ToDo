<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секундомер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Секундомер</h1>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        <div class="timer-buttons">
            <button id="startBtn" class="timer-btn start">Старт</button>
            <button id="stopBtn" class="timer-btn stop">Стоп</button>
            <button id="resetBtn" class="timer-btn reset">Сброс</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
